<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WoW Sims JSON Item Extractor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    .top {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .column {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 15px;
    }

    .column h3 {
      margin-top: 0;
      color: #4cafef;
    }

    .drop-zone {
      border: 2px dashed #888;
      border-radius: 10px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .drop-zone.dragover {
      border-color: #4cafef;
      background: #2a2a2a;
    }

    textarea {
      width: 100%;
      height: 150px;
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px;
      font-family: monospace;
      resize: vertical;
    }

    .outputs {
      display: flex;
      gap: 20px;
    }

    .combined-output {
      margin-top: 20px;
    }

    .output-box {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 15px;
      min-height: 200px;
    }

    .output-box h3 {
      margin-top: 0;
      color: #4cafef;
    }

    .content {
      white-space: pre-wrap;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <div class="top">
    <div class="column">
      <h3>Upload JSON</h3>
      <div class="drop-zone" id="dropZone">
        Drag & drop file here or click
        <input type="file" id="fileInput" accept=".json" hidden>
      </div>
    </div>

    <div class="column">
      <h3>Paste JSON</h3>
      <textarea id="jsonInput" placeholder="Paste WoW Sims JSON here..."></textarea>
    </div>
  </div>

  <div class="outputs">
    <div class="output-box">
      <h3>Gear</h3>
      <div class="content" id="gearOutput">...</div>
    </div>

    <div class="output-box">
      <h3>Gems</h3>
      <div class="content" id="gemsOutput">...</div>
    </div>

    <div class="output-box">
      <h3>Enchants</h3>
      <div class="content" id="enchantsOutput">...</div>
    </div>
  </div>

  <div class="combined-output">
    <div class="output-box">
      <h3>Combined Macros (Mixed, Min Lines)</h3>
      <div class="content" id="combinedOutput">...</div>
    </div>
  </div>

  <script>
    // Created with help of various AI tools
    const MACRO_LINE_LIMIT = 10;

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const jsonInput = document.getElementById('jsonInput');

    const gearOutput = document.getElementById('gearOutput');
    const gemsOutput = document.getElementById('gemsOutput');
    const enchantsOutput = document.getElementById('enchantsOutput');
    const combinedOutput = document.getElementById('combinedOutput');

    /**
     * Mapping of MoP Endgame Enchant IDs to their corresponding Scroll/Item IDs.
     * Verified via Wowhead database.
     */
    const MOP_ENCHANT_MAP = {
      // --- WEAPONS ---
      4444: { itemId: 74728, name: "Dancing Steel" },       // Strength/Agility Proc
      4442: { itemId: 74729, name: "Jade Spirit" },         // Intellect/Spirit Proc
      4443: { itemId: 74726, name: "Flowing River" },       // Dodge Proc
      4441: { itemId: 74724, name: "Windsong" },            // Crit/Haste/Mastery Proc
      4440: { itemId: 74723, name: "Elemental Force" },     // Spell Damage Proc
      4445: { itemId: 74725, name: "Colossus" },            // Damage Absorb Proc

      // --- SHOULDERS (Inscriptions) ---
      4803: { itemId: 87559, name: "Greater Tiger Fang Inscription" },   // Strength
      4804: { itemId: 87560, name: "Greater Crane Wing Inscription" },   // Intellect
      4805: { itemId: 87558, name: "Greater Ox Horn Inscription" },      // Stamina
      4802: { itemId: 87557, name: "Greater Hyena Claw Inscription" },   // Agility

      // --- BACK (Cloak) ---
      4424: { itemId: 74713, name: "Accuracy" },           // Hit
      4425: { itemId: 74714, name: "Greater Agility" },
      4426: { itemId: 74715, name: "Greater Intellect" },
      4423: { itemId: 74712, name: "Superior Critical Strike" },
      4422: { itemId: 74711, name: "Superior Protection" },    // Armor

      // --- CHEST ---
      4419: { itemId: 74708, name: "Glorious Stats" },     // +80 All Stats
      4418: { itemId: 74707, name: "Mighty Resilience" },
      4420: { itemId: 74709, name: "Superior Stamina" },

      // --- BRACERS ---
      4415: { itemId: 74703, name: "Exceptional Strength" },
      4416: { itemId: 74704, name: "Greater Agility" },
      4417: { itemId: 74705, name: "Super Intellect" },
      4414: { itemId: 74706, name: "Mastery" },

      // --- GLOVES ---
      4432: { itemId: 74719, name: "Super Strength" },
      4433: { itemId: 74720, name: "Greater Haste" },
      4434: { itemId: 74722, name: "Greater Mastery" },
      4431: { itemId: 74721, name: "Superior Expertise" },

      // --- LEGS (Armor Patches / Spellthreads) ---
      4823: { itemId: 83765, name: "Angerhide Leg Armor" },       // Strength/Crit
      4822: { itemId: 83764, name: "Ironscale Leg Armor" },       // Stamina/Dodge
      4830: { itemId: 82445, name: "Shadowleather Leg Armor" },   // Agility/Crit
      4831: { itemId: 95471, name: "Greater Cerulean Spellthread" }, // Int/Crit
      4832: { itemId: 95470, name: "Greater Pearlescent Spellthread" }, // Int/Spirit

      // --- FEET ---
      4429: { itemId: 74716, name: "Pandaren's Step" },    // Mastery/Speed
      4430: { itemId: 74717, name: "Greater Haste" },
      4428: { itemId: 74718, name: "Greater Precision" },  // Hit

      // --- OFF-HAND / SHIELD ---
      4438: { itemId: 74730, name: "Greater Parry" },
      4439: { itemId: 74731, name: "Major Intellect" }
    };

    // Drag & Drop
    dropZone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      handleTextFile(e.target.files[0]);
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      handleTextFile(e.dataTransfer.files[0]);
    });

    function handleTextFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => parseJSON(e.target.result);
      reader.readAsText(file);
    }

    // Paste (debounced)
    let pasteTimeout;
    jsonInput.addEventListener('input', () => {
      clearTimeout(pasteTimeout);
      pasteTimeout = setTimeout(() => {
        parseJSON(jsonInput.value);
      }, 400);
    });

    function formatAddCommands(addLines, emptyText = "") {
      if (!addLines.length) return emptyText;

      const chunks = [];
      for (let i = 0; i < addLines.length; i += MACRO_LINE_LIMIT) {
        chunks.push(addLines.slice(i, i + MACRO_LINE_LIMIT).join("\n"));
      }

      return chunks.join("\n\n");
    }

    function parseJSON(text) {
      try {
        const json = JSON.parse(text);
        const items = json?.player?.equipment?.items || [];

        // Gear
        const gearLines = items
          .filter(item => item && item.id)
          .map(item => `.add ${item.id}`);
        gearOutput.textContent = formatAddCommands(gearLines, "No gear found.");

        // Gems
        const gemCounts = {};
        items.forEach(item => {
          if (item && Array.isArray(item.gems)) {
            item.gems.forEach(gem => {
              if (gem && gem !== 0) {
                gemCounts[gem] = (gemCounts[gem] || 0) + 1;
              }
            });
          }
        });

        const gemLines = Object.entries(gemCounts)
          .map(([id, count]) => `.add ${id} ${count}`);
        gemsOutput.textContent = formatAddCommands(gemLines, "No gems found.");

        // Enchants
        const enchantCounts = {};
        const unmappedEnchantCounts = {};
        items.forEach(item => {
          if (item && item.enchant) {
            const mappedEnchant = MOP_ENCHANT_MAP[item.enchant];
            if (mappedEnchant) {
              const enchantItemId = mappedEnchant.itemId;
              enchantCounts[enchantItemId] = (enchantCounts[enchantItemId] || 0) + 1;
            } else {
              unmappedEnchantCounts[item.enchant] = (unmappedEnchantCounts[item.enchant] || 0) + 1;
            }
          }
        });

        const enchantLines = Object.entries(enchantCounts)
          .map(([id, count]) => `.add ${id} ${count}`);

        const unmappedEnchantLines = Object.entries(unmappedEnchantCounts)
          .map(([id, count]) => `# Unmapped enchant ID ${id} x${count}`);

        const formattedEnchantAdds = formatAddCommands(enchantLines);
        const enchantSections = [];

        if (formattedEnchantAdds) {
          enchantSections.push(formattedEnchantAdds);
        }

        if (unmappedEnchantLines.length) {
          enchantSections.push(unmappedEnchantLines.join("\n"));
        }

        enchantsOutput.textContent = enchantSections.join("\n") || "No enchants found.";

        // Combined mixed macros: aggregate all addable item IDs to minimize line count.
        const combinedCounts = {};
        items.forEach(item => {
          if (item && item.id) {
            combinedCounts[item.id] = (combinedCounts[item.id] || 0) + 1;
          }

          if (item && Array.isArray(item.gems)) {
            item.gems.forEach(gem => {
              if (gem && gem !== 0) {
                combinedCounts[gem] = (combinedCounts[gem] || 0) + 1;
              }
            });
          }

          if (item && item.enchant) {
            const mappedEnchant = MOP_ENCHANT_MAP[item.enchant];
            if (mappedEnchant) {
              const enchantItemId = mappedEnchant.itemId;
              combinedCounts[enchantItemId] = (combinedCounts[enchantItemId] || 0) + 1;
            }
          }
        });

        const combinedLines = Object.entries(combinedCounts)
          .sort((a, b) => Number(a[0]) - Number(b[0]))
          .map(([id, count]) => count > 1 ? `.add ${id} ${count}` : `.add ${id}`);

        const formattedCombinedAdds = formatAddCommands(combinedLines);
        const combinedSections = [];

        if (formattedCombinedAdds) {
          combinedSections.push(formattedCombinedAdds);
        }

        if (unmappedEnchantLines.length) {
          combinedSections.push(unmappedEnchantLines.join("\n"));
        }

        combinedOutput.textContent = combinedSections.join("\n") || "No items found.";

      } catch {
        gearOutput.textContent = "Invalid JSON.";
        gemsOutput.textContent = "Invalid JSON.";
        enchantsOutput.textContent = "Invalid JSON.";
        combinedOutput.textContent = "Invalid JSON.";
      }
    }
  </script>

</body>
</html>
