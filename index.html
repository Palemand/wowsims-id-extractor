<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WoW Sims JSON Item Extractor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    .top {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .column {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 15px;
    }

    .column h3 {
      margin-top: 0;
      color: #4cafef;
    }

    .drop-zone {
      border: 2px dashed #888;
      border-radius: 10px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .drop-zone.dragover {
      border-color: #4cafef;
      background: #2a2a2a;
    }

    textarea {
      width: 100%;
      height: 150px;
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px;
      font-family: monospace;
      resize: vertical;
    }

    .outputs {
      display: flex;
      gap: 20px;
    }

    .combined-output {
      margin-top: 20px;
    }

    .macro-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .macro-notes {
      margin-top: 12px;
      color: #ffd27a;
    }

    .output-box {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 15px;
      min-height: 200px;
    }

    .output-box h3 {
      margin-top: 0;
      color: #4cafef;
    }

    .content {
      white-space: pre-wrap;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <div class="top">
    <div class="column">
      <h3>Upload JSON</h3>
      <div class="drop-zone" id="dropZone">
        Drag & drop file here or click
        <input type="file" id="fileInput" accept=".json" hidden>
      </div>
    </div>

    <div class="column">
      <h3>Paste JSON</h3>
      <textarea id="jsonInput" placeholder="Paste WoW Sims JSON here..."></textarea>
    </div>
  </div>

  <div class="outputs">
    <div class="output-box">
      <h3>Gear</h3>
      <div class="content" id="gearOutput">...</div>
    </div>

    <div class="output-box">
      <h3>Gems</h3>
      <div class="content" id="gemsOutput">...</div>
    </div>

    <div class="output-box">
      <h3>Enchants</h3>
      <div class="content" id="enchantsOutput">...</div>
    </div>
  </div>

  <div class="combined-output">
    <h3>Macros</h3>
    <div class="macro-grid" id="macroGrid"></div>
    <div class="content macro-notes" id="macroNotes"></div>
  </div>

  <script>
    // Created with help of various AI tools
    const MACRO_LINE_LIMIT = 10;

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const jsonInput = document.getElementById('jsonInput');

    const gearOutput = document.getElementById('gearOutput');
    const gemsOutput = document.getElementById('gemsOutput');
    const enchantsOutput = document.getElementById('enchantsOutput');
    const macroGrid = document.getElementById('macroGrid');
    const macroNotes = document.getElementById('macroNotes');

    /**
     * Mapping of MoP enchant effect IDs to consumable item IDs.
     * Sourced from wowsims MoP database output and spot-checked on Wowhead.
     */
    const MOP_ENCHANT_MAP = {
      4414: { itemId: 74703, name: "Enchant Bracer - Super Intellect" },
      4415: { itemId: 74704, name: "Enchant Bracer - Exceptional Strength" },
      4416: { itemId: 74705, name: "Enchant Bracer - Greater Agility" },
      4417: { itemId: 74706, name: "Enchant Chest - Super Resilience" },
      4418: { itemId: 74707, name: "Enchant Chest - Mighty Spirit" },
      4419: { itemId: 74708, name: "Enchant Chest - Glorious Stats" },
      4420: { itemId: 74709, name: "Enchant Chest - Superior Stamina" },
      4422: { itemId: 74711, name: "Enchant Cloak - Greater Protection" },
      4423: { itemId: 74712, name: "Enchant Cloak - Superior Intellect" },
      4424: { itemId: 74713, name: "Enchant Cloak - Superior Critical Strike" },
      4426: { itemId: 74715, name: "Enchant Boots - Greater Haste" },
      4428: { itemId: 74717, name: "Enchant Boots - Blurred Speed" },
      4429: { itemId: 74718, name: "Enchant Boots - Pandaren's Step" },
      4430: { itemId: 74719, name: "Enchant Gloves - Greater Haste" },
      4431: { itemId: 74720, name: "Enchant Gloves - Superior Expertise" },
      4432: { itemId: 74721, name: "Enchant Gloves - Super Strength" },
      4433: { itemId: 74722, name: "Enchant Gloves - Superior Mastery" },
      4434: { itemId: 74729, name: "Enchant Off-Hand - Major Intellect" },
      4441: { itemId: 74723, name: "Enchant Weapon - Windsong" },
      4442: { itemId: 74724, name: "Enchant Weapon - Jade Spirit" },
      4443: { itemId: 74725, name: "Enchant Weapon - Elemental Force" },
      4444: { itemId: 74726, name: "Enchant Weapon - Dancing Steel" },
      4445: { itemId: 74727, name: "Enchant Weapon - Colossus" },
      4803: { itemId: 83006, name: "Greater Tiger Fang Inscription" },
      4804: { itemId: 83007, name: "Greater Tiger Claw Inscription" },
      4805: { itemId: 87560, name: "Greater Ox Horn Inscription" },
      4822: { itemId: 83764, name: "Shadowleather Leg Armor" },
      4823: { itemId: 83765, name: "Angerhide Leg Armor" }
    };

    // Drag & Drop
    dropZone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      handleTextFile(e.target.files[0]);
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      handleTextFile(e.dataTransfer.files[0]);
    });

    function handleTextFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => parseJSON(e.target.result);
      reader.readAsText(file);
    }

    // Paste (debounced)
    let pasteTimeout;
    jsonInput.addEventListener('input', () => {
      clearTimeout(pasteTimeout);
      pasteTimeout = setTimeout(() => {
        parseJSON(jsonInput.value);
      }, 400);
    });

    function splitAddCommandsIntoMacros(addLines) {
      const chunks = [];
      for (let i = 0; i < addLines.length; i += MACRO_LINE_LIMIT) {
        chunks.push(addLines.slice(i, i + MACRO_LINE_LIMIT));
      }
      return chunks;
    }

    function renderCombinedMacros(addLines, noteLines = []) {
      macroGrid.innerHTML = "";

      const macroChunks = splitAddCommandsIntoMacros(addLines);

      if (!macroChunks.length) {
        const emptyBox = document.createElement('div');
        emptyBox.className = 'output-box';

        const title = document.createElement('h3');
        title.textContent = 'Macro 1 (0 items)';

        const content = document.createElement('div');
        content.className = 'content';
        content.textContent = 'No items found.';

        emptyBox.appendChild(title);
        emptyBox.appendChild(content);
        macroGrid.appendChild(emptyBox);
      } else {
        macroChunks.forEach((chunk, index) => {
          const macroBox = document.createElement('div');
          macroBox.className = 'output-box';

          const title = document.createElement('h3');
          title.textContent = `Macro ${index + 1} (${chunk.length} items)`;

          const content = document.createElement('div');
          content.className = 'content';
          content.textContent = chunk.join("\n");

          macroBox.appendChild(title);
          macroBox.appendChild(content);
          macroGrid.appendChild(macroBox);
        });
      }

      macroNotes.textContent = noteLines.join("\n");
    }

    function parseJSON(text) {
      try {
        const json = JSON.parse(text);
        const items = json?.player?.equipment?.items || [];

        // Gear
        const gearLines = items
          .filter(item => item && item.id)
          .map(item => `.add ${item.id}`);
        gearOutput.textContent = gearLines.join("\n") || "No gear found.";

        // Gems
        const gemCounts = {};
        items.forEach(item => {
          if (item && Array.isArray(item.gems)) {
            item.gems.forEach(gem => {
              if (gem && gem !== 0) {
                gemCounts[gem] = (gemCounts[gem] || 0) + 1;
              }
            });
          }
        });

        const gemLines = Object.entries(gemCounts)
          .map(([id, count]) => `.add ${id} ${count}`);
        gemsOutput.textContent = gemLines.join("\n") || "No gems found.";

        // Enchants
        const enchantCounts = {};
        const unmappedEnchantCounts = {};
        items.forEach(item => {
          if (item && item.enchant) {
            const mappedEnchant = MOP_ENCHANT_MAP[item.enchant];
            if (mappedEnchant) {
              const enchantItemId = mappedEnchant.itemId;
              enchantCounts[enchantItemId] = (enchantCounts[enchantItemId] || 0) + 1;
            } else {
              unmappedEnchantCounts[item.enchant] = (unmappedEnchantCounts[item.enchant] || 0) + 1;
            }
          }
        });

        const enchantLines = Object.entries(enchantCounts)
          .map(([id, count]) => `.add ${id} ${count}`);

        const unmappedEnchantLines = Object.entries(unmappedEnchantCounts)
          .map(([id, count]) => `# Unmapped enchant ID ${id} x${count}`);

        const combinedEnchantLines = [...enchantLines, ...unmappedEnchantLines];
        enchantsOutput.textContent = combinedEnchantLines.join("\n") || "No enchants found.";

        // Combined mixed macros: aggregate all addable item IDs to minimize line count.
        const combinedCounts = {};
        items.forEach(item => {
          if (item && item.id) {
            combinedCounts[item.id] = (combinedCounts[item.id] || 0) + 1;
          }

          if (item && Array.isArray(item.gems)) {
            item.gems.forEach(gem => {
              if (gem && gem !== 0) {
                combinedCounts[gem] = (combinedCounts[gem] || 0) + 1;
              }
            });
          }

          if (item && item.enchant) {
            const mappedEnchant = MOP_ENCHANT_MAP[item.enchant];
            if (mappedEnchant) {
              const enchantItemId = mappedEnchant.itemId;
              combinedCounts[enchantItemId] = (combinedCounts[enchantItemId] || 0) + 1;
            }
          }
        });

        const combinedLines = Object.entries(combinedCounts)
          .sort((a, b) => Number(a[0]) - Number(b[0]))
          .map(([id, count]) => count > 1 ? `.add ${id} ${count}` : `.add ${id}`);

        renderCombinedMacros(combinedLines, unmappedEnchantLines);

      } catch {
        gearOutput.textContent = "Invalid JSON.";
        gemsOutput.textContent = "Invalid JSON.";
        enchantsOutput.textContent = "Invalid JSON.";
        macroGrid.innerHTML = "";
        macroNotes.textContent = "Invalid JSON.";
      }
    }
  </script>

</body>
</html>
